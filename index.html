<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="body">
  <div class="container">
    <div class="display-container">
    <input type="text" id="first-number" class="display part1" placeholder="A" readonly style="width: 7.5rem" onclick="changeField('1')">
    <input type="text" id="operator" class="display part2" placeholder="Op" readonly style="width: 2rem">
    <input type="text" id="second-number" class="display part3" placeholder="B" readonly style="width: 7.5rem" onclick="changeField('2')">
    <!-- <input type="text" class="display part3" placeholder="B" readonly style="width: 7.5rem"> -->

  </div>
    <div class="display-container">
    <input type="text" class="display part4" placeholder="Result" readonly style="width: 17rem" id="result">
  </div>
    <div class="buttons">
      
      <button class="btn-operator" value="clear" onclick="allclear()">C</button>
       <button class="btn-operator" value="sqrt" onclick="clearOne()">⌫</button>
      <button class="btn-operator" value="square" onclick="sign()">+/-</button>
      <button class="btn-operator" value="square" onclick="addOperator('%')">%</button>
      <button class="btn-operator" onclick="addOperator('%')">%</button>


     

      <button class="btn-number" value="9" onclick="addNumber(9);">9</button>
      <button class="btn-number" value="8" onclick="addNumber(8);">8</button>
      <button class="btn-number" value="7" onclick="addNumber(7);">7</button>
      <button class="btn-operator" onclick="addOperator('/')">÷</button>


      <button class="btn-number" value="6" onclick="addNumber(6);">6</button>
      <button class="btn-number" value="5" onclick="addNumber(5);">5</button>

      <button class="btn-number" value="4" onclick="addNumber(4);">4</button>
      <button class="btn-operator" onclick="addOperator('*')">×</button>

      <button class="btn-number" value="3" onclick="addNumber(3);">3</button>
      <button class="btn-number" value="2" onclick="addNumber(2);">2</button>

      <button class="btn-number" value="1" onclick="addNumber(1);">1</button>
      <button class="btn-operator" onclick="addOperator('-')">-</button>
      <button class="btn-number" value="0" onclick="addNumber(0);">0</button>

      <button class="btn-number" value="." onclick="addNumber('.');">.</button>
      <button class="btn-operator" onclick="addOperator('^')">^</button>
      <button class="btn-operator" onclick="addOperator('+')">+</button>


      <!-- <button class="btn-operator" id="slas">/</button> -->


    </div>
    <button class="btn-equal" value="=" onclick="calculate()">=</button>
    <footer class="footer">
      🪷 राधे कृष्णा | Made by Ansh Pandey |© Frontend Developer
    </footer>
  </div>

</body>

</html>
<script src="script.js"></script>
